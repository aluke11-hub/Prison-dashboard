body{background:#080810;color:#e0e0e0;font-family:Georgia,'Times New Roman',serif;min-height:100vh}

.kpi-row{display:flex;gap:12px;flex-wrap:wrap}
.kpi{background:rgba(255,255,255,0.03);border-radius:8px;padding:14px 18px;flex:1 1 140px}
.kpi-val{font-size:22px;font-weight:800}
.kpi-lbl{font-size:11px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:1px}
.kpi-sub{font-size:11px;color:#555;margin-top:2px}

.content{padding:28px 32px;max-width:1400px;margin:0 auto}
.section-title{color:#ef4444;font-size:20px;margin-bottom:6px}
.section-sub{color:#555;font-size:13px;margin-bottom:22px;line-height:1.5}
.card{background:#0e0e20;border:1px solid #1e1e3a;border-radius:10px;padding:22px;margin-bottom:24px}
.card-title{margin-bottom:16px;color:#aaa;font-size:12px;text-transform:uppercase;letter-spacing:2.5px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.bar-label{width:160px;text-align:right;color:#aaa;flex-shrink:0;font-size:11px}
.bar-track{flex:1;background:#1a1a2e;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;color:#fff;font-weight:700;white-space:nowrap}
.bar-val{width:60px;color:#aaa;font-size:11px;flex-shrink:0}
table{border-collapse:collapse;width:100%;font-size:13px}
th{padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#ef4444;background:#130010;border-bottom:2px solid #7f1d1d;white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid #141424;color:#ccc}
tr:hover td{background:#0d0d1e}
.tbl-wrap{overflow-x:auto}
.sort-btn{background:none;border:1px solid #333;color:#777;padding:5px 12px;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:12px;margin-right:6px}

.filter-btn{background:none;border:1px solid #333;color:#777;padding:5px 14px;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:12px;margin-right:6px}

.cmte-card{background:#0e0e20;border:1px solid #1e1e3a;border-radius:8px;overflow:hidden;margin-bottom:12px;cursor:pointer}
.cmte-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.cmte-expand{background:#080810;border-top:1px solid #1e1e3a;padding:16px 20px;font-size:13px;line-height:1.6;color:#bbb;display:none}
.cmte-expand.open{display:block}
.badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-right:6px}
.news-card{background:#130a00;border-radius:6px;padding:14px;border-left:3px solid}
.news-date{font-size:11px;color:#666;margin-bottom:4px}
.news-head{font-weight:700;color:#fed7aa;font-size:13px;margin-bottom:6px}

.fac-card{border-radius:8px;padding:20px;margin-bottom:14px;border:1px solid}

.footer{margin-top:40px;border-top:1px solid #1e1e3a;padding-top:18px;color:#333;font-size:11px;line-height:1.7}
.how-card{background:#001a0a;border:1px solid #14532d;border-radius:6px;padding:14px}
.how-card h4{color:#4ade80;font-size:13px;margin-bottom:6px}
.how-card p{color:#666;font-size:12px;line-height:1.5}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr!important}.kpi-row{flex-wrap:wrap}.bar-label{width:80px}}
</style>

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toLocaleString();}

    +'</div></div>'
    +'<div class="grid-2" style="gap:12px">'
    +'<div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">Appropriation Source</div><div style="font-size:12px;color:#bbb;line-height:1.5">'+f.app+'</div></div>'
    +'<div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">Key Notes</div><div style="font-size:12px;color:#bbb;line-height:1.5">'+f.note+'</div></div>'
    +'</div></div>';
  }).join('');
}

function renderStates(){
  var sorted=DATA.states.slice().sort(function(a,b){return b[stateSort]-a[stateSort];});
  var maxVal=Math.max.apply(null,sorted.map(function(s){return s[stateSort];}));
  var labels={p:'Prison Population',b:'Corrections Budget ($B)',f:'Facility Count',r:'Rate/100K'};
  return '<h2 class="section-title">State-by-State Data</h2><p class="section-sub">State prison populations. Budgets = corrections appropriations. Rate = per 100K adults.</p>'
  +'<div style="margin-bottom:18px"><span style="color:#555;font-size:12px;margin-right:8px">Sort by:</span>'
  +['p','b','f','r'].map(function(k){return '<button class="sort-btn'+(stateSort===k?' on':'')+'" onclick="stateSort=\''+k+'\';renderTab(\'states\')">'+(k==='p'?'Population':k==='b'?'Budget':k==='f'?'Facilities':'Inc. Rate')+'</button>';}).join('')+'</div>'
  +'<div class="card" style="margin-bottom:24px"><div class="card-title">All States &mdash; '+labels[stateSort]+'</div><div class="bar-chart">'
  +sorted.slice(0,25).map(function(s){
    var val=s[stateSort];
    var display=stateSort==='b'?'$'+val+'B':stateSort==='r'?val:val.toLocaleString();
    var color=stateSort==='r'?(val>700?'#ef4444':val<200?'#22c55e':'#3b82f6'):'#ef4444';
    return bar(s.s,val,maxVal,color,display);
  }).join('')+'</div></div>'
  +'<div class="tbl-wrap"><table><thead><tr><th>State</th><th>Prisons</th><th>Prison Pop.</th><th>Budget</th><th>Rate/100K</th></tr></thead><tbody>'
  +sorted.map(function(s){return '<tr><td style="font-weight:700;color:#ef4444">'+s.s+'</td><td>'+s.f+'</td><td>'+s.p.toLocaleString()+'</td><td style="color:#fbbf24">$'+s.b+'B</td><td style="color:'+(s.r>700?'#ef4444':s.r<200?'#22c55e':'#ccc')+';font-weight:'+(s.r>700||s.r<200?700:400)+'">'+s.r+'</td></tr>';}).join('')
  +'</tbody></table></div>';
}

function renderFederal(){
  var agencies=[
    {title:"Bureau of Prisons &mdash; $9.1B base + $5B OBBBA",color:"#16a34a",bill:"Commerce, Justice, Science (CJS) Appropriations Act",acct:"Federal Prison System S&amp;E &mdash; Account 15-1060",recent:"OBBBA: $5B over FY2025-2029. Federal Prison Oversight Act (2024) mandates annual DOJ IG inspections.",use:"Personnel (35K+ staff), healthcare, programming, food, utilities"},
    {title:"ICE Detention &mdash; $14.4B/yr effective",color:"#d97706",bill:"DHS Appropriations Act (base) + OBBBA reconciliation",acct:"DHS ERO &mdash; Custody Operations PPA",recent:"OBBBA: $45B for new facilities + $29.9B operations over 4 yrs. ICE now largest federal law enforcement agency by budget.",use:"GEO Group, CoreCivic contracts; county jail agreements; transportation"},
    {title:"U.S. Marshals Service &mdash; $1.5B",color:"#8b5cf6",bill:"CJS Appropriations Act",acct:"USMS S&amp;E + Federal Prisoner Detention Trustee Account",recent:"No OBBBA supplement. Holds ~56K pretrial federal detainees. No USMS-operated facilities.",use:"Per-diem reimbursements to BOP, local jails, and private facilities"},
    {title:"BIA Indian Country Jails &mdash; ~$140M",color:"#0891b2",bill:"Interior, Environment &amp; Related Agencies Appropriations Act",acct:"BIA Law Enforcement &mdash; Indian Country Detention",recent:"Tribal Law and Order Act grants. Chronic underfunding per GAO.",use:"80 tribal jails; grants to tribes; training and equipment"}
  ];
  var fedBars=[{name:"ICE (OBBBA+base)",val:14.4,color:"#d97706"},{name:"BOP (base+supp)",val:9.1,color:"#16a34a"},{name:"CBP Enforcement",val:8.0,color:"#ea580c"},{name:"USMS Detention",val:1.5,color:"#8b5cf6"},{name:"Military/Other",val:0.6,color:"#4f46e5"},{name:"BIA/Tribal",val:0.14,color:"#0891b2"}];
  return '<h2 class="section-title">Federal Budget &amp; Appropriations</h2><p class="section-sub">The OBBBA (P.L.119-21, July 2025) transformed federal carceral spending. The $45B ICE detention appropriation alone exceeds the entire BOP annual budget.</p>'
  +'<div class="card" style="margin-bottom:24px"><div class="card-title">Federal Agency Spending (FY2025 Effective)</div><div class="bar-chart">'+fedBars.map(function(f){return bar(f.name,f.val,15,f.color,'$'+f.val+'B');}).join('')+'</div></div>'
  +agencies.map(function(a){return '<div style="background:#0e0e20;border-left:4px solid '+a.color+';border:1px solid '+a.color+'20;border-radius:8px;padding:20px;margin-bottom:14px"><h3 style="color:'+a.color+';font-size:15px;margin-bottom:14px">'+a.title+'</h3><div class="grid-2" style="gap:12px">'
  +'<div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">Appropriations Bill</div><div style="font-size:12px;color:#bbb;line-height:1.5">'+a.bill+'</div></div>'
  +'<div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">Budget Account</div><div style="font-size:12px;color:#bbb;line-height:1.5">'+a.acct+'</div></div>'
  +'<div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">Recent Legislation</div><div style="font-size:12px;color:#bbb;line-height:1.5">'+a.recent+'</div></div>'
  +'<div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">Primary Use</div><div style="font-size:12px;color:#bbb;line-height:1.5">'+a.use+'</div></div>'
  +'</div></div>';}).join('');
}

function renderFCmte(){
  var filtered=chamberFilter==='ALL'?COMMITTEES:COMMITTEES.filter(function(c){return c.chamber===chamberFilter;});
  return '<h2 class="section-title">Federal Congressional Oversight Committees</h2><p class="section-sub">Two tracks: Appropriations (who fund) and Judiciary/Homeland Security (who oversee policy).</p>'
  +'<div style="margin-bottom:20px">'+['ALL','SENATE','HOUSE'].map(function(f){return '<button class="filter-btn'+(chamberFilter===f?' on':'')+'" onclick="chamberFilter=\''+f+'\';renderTab(\'fcmte\')">'+(f==='ALL'?'All Chambers':f)+'</button>';}).join('')+'</div>'
  +filtered.map(function(c,i){
    return '<div class="cmte-card" onclick="tog(\'cm'+i+'\')">'
    +'<div class="cmte-header"><div style="flex:1">'+badge(c.chamber,c.chamber==='SENATE'?'#b91c1c':'#1d4ed8')+badge(c.role,c.role==='Appropriator'?'#d97706':'#7c3aed')+'<br><div style="color:#fff;font-size:15px;font-weight:700;margin-top:6px">'+c.name+'</div></div>'
    +'<div style="text-align:right;min-width:160px"><div style="font-size:11px;color:#444;text-transform:uppercase">Chair</div><div style="color:#ccc;font-size:13px">'+c.chair+'</div>'+(c.ranking?'<div style="font-size:11px;color:#444;text-transform:uppercase;margin-top:4px">Ranking</div><div style="color:#ccc;font-size:13px">'+c.ranking+'</div>':'')+'</div></div>'
    +'<div class="cmte-expand" id="cm'+i+'"><div class="grid-2" style="gap:16px"><div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">Jurisdiction</div><div>'+c.detail+'</div></div><div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">Website</div><div style="color:#3b82f6">'+c.url+'</div></div></div></div>'
    +'<div style="background:#07070e;padding:5px 20px;border-top:1px solid #1e1e3a;font-size:11px;color:#333">Click to expand</div></div>';
  }).join('');
}

function renderSCmte(){
  var maxB=Math.max.apply(null,TOP15.map(function(s){return s.b;}));
  return '<h2 class="section-title">State Committees &mdash; Top 15 by Corrections Budget</h2><p class="section-sub">These 15 states account for ~74% of all state corrections spending.</p>'
  +'<div class="card" style="margin-bottom:24px"><div class="card-title">Top 15 State Corrections Budgets</div><div class="bar-chart">'+TOP15.map(function(s){return bar(s.s,s.b,maxB,'#ef4444','$'+s.b+'B');}).join('')+'</div></div>'
  +TOP15.map(function(s,i){
    return '<div class="cmte-card" onclick="tog(\'st'+i+'\')">'
    +'<div class="cmte-header"><div style="flex:1"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap"><span style="font-size:22px;font-weight:800;color:#ef4444">#'+(i+1)+' '+s.s+'</span>'+badge('$'+s.b+'B','#d97706')+'<span style="color:#555;font-size:12px">'+s.agency+'</span></div><div style="font-size:12px;color:#777"><strong style="color:#ef4444">Appropriations: </strong>'+s.appro+'</div></div><div style="font-size:11px;color:#333">Click to expand</div></div>'
    +'<div class="cmte-expand" id="st'+i+'"><div class="grid-2" style="gap:16px"><div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">Policy / Oversight Committees</div><div style="margin-bottom:12px">'+s.policy+'</div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">2025 Leadership</div><div>'+s.chair+'</div></div><div><div style="font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">Key Context</div><div>'+s.notes+'</div></div></div></div>'
    +'</div>';
  }).join('');
}

function renderSources(){
  return '<h2 class="section-title">Data Sources &amp; Monthly Update Guide</h2><p class="section-sub">To update data: go to your GitHub repo, click index.html, click the pencil icon, find the DATA section at the top, edit the numbers, and commit. Your site updates within 2 minutes.</p>'
  +'<div class="card" style="border-left:4px solid #22c55e;margin-bottom:24px"><div class="card-title" style="color:#4ade80">How to Update Data Monthly</div><div class="grid-3"><div class="how-card"><h4>1. Go to GitHub</h4><p>Open github.com, go to your prison-dashboard repo, click index.html</p></div><div class="how-card"><h4>2. Click the pencil icon</h4><p>Find the DATA section at the top. Change any numbers or news items you want.</p></div><div class="how-card"><h4>3. Commit changes</h4><p>Scroll down and click Commit changes. Your live URL updates within 2 minutes.</p></div></div></div>'
  +[
    {name:"BOP Population Stats",url:"bop.gov/about/statistics/population_statistics.jsp",freq:"Weekly",what:"Total Federal Inmates count"},
    {name:"ICE Detention Mgmt",url:"ice.gov/detain/detention-management",freq:"Monthly",what:"Total currently detained + facility spreadsheet"},
    {name:"BJS Prisoners Report",url:"bjs.ojp.gov",freq:"Annual",what:"State prison populations (released each fall)"},
    {name:"Vera Institute",url:"vera.org/publications",freq:"Quarterly",what:"Fastest state-level population tracking"},
    {name:"USAFacts State Budgets",url:"usafacts.org",freq:"Annual",what:"State corrections spending"},
    {name:"Senate Appropriations",url:"appropriations.senate.gov",freq:"As needed",what:"New bill markups and passed appropriations"},
    {name:"House Judiciary",url:"judiciary.house.gov",freq:"As needed",what:"BOP and ICE oversight hearing news"}
  ].map(function(s){return '<div class="source-row"><div><div style="font-weight:700;color:#fff;font-size:14px">'+s.name+'</div><div style="color:#3b82f6;font-size:12px;margin-top:2px">'+s.url+'</div><div style="color:#666;font-size:12px;margin-top:2px">'+s.what+'</div></div>'+badge(s.freq,'#7c3aed')+'</div>';}).join('');
}

function tog(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}

var TABS=[{id:'overview',label:'Overview'},{id:'types',label:'Facility Types'},{id:'states',label:'By State'},{id:'federal',label:'Federal Budget'},{id:'fcmte',label:'Federal Committees'},{id:'scmte',label:'State Committees'},{id:'sources',label:'Sources'}];

function renderTab(tabId){
  activeTab=tabId;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tabId);});
  var renderers={overview:renderOverview,types:renderTypes,states:renderStates,federal:renderFederal,fcmte:renderFCmte,scmte:renderSCmte,sources:renderSources};
  var fn=renderers[tabId]||renderOverview;
  document.getElementById('tab-content').innerHTML=fn()+'<div class="footer">Data from BJS, BOP, ICE, PPI, USAFacts, OBBBA (P.L.119-21, July 2025). Congressional committees: 119th Congress. All figures approximate. Last updated: '+DATA.last_updated+'</div>';
}

function init(){
  var s=DATA.stats;
  document.getElementById('app').innerHTML=
  '<div class="header">'
  +'<div class="header-label">Live National Data Dashboard &middot; Last updated: '+DATA.last_updated+'</div>'
  +'<h1>U.S. Prison &amp; Detention<br><span>Ecosystem Monitor</span></h1>'
  +'<p>Federal &middot; State &middot; Local &middot; Immigration detention &middot; Populations, budgets &amp; congressional oversight &middot; Data as of '+DATA.data_as_of+'</p>'
  +'<div class="status-pill"><span class="status-dot"></span><span>Data current &middot; Next update: '+DATA.next_update+'</span></div>'
  +'<div class="kpi-row">'
  +kpi('Total Facilities',s.total_facilities.toLocaleString()+'+','All types, all jurisdictions','#ef4444')
  +kpi('People Incarcerated','~'+fmt(s.total_incarcerated),'All facility types','#f97316')
  +kpi('ICE Detained Now',s.ice_detained.toLocaleString()+'+',s.ice_note,'#eab308')
  +kpi('System Cost','$'+s.system_cost+'B/yr','Federal + State + Local','#22c55e')
  +kpi('Federal BOP','$'+s.bop_budget+'B','FY2025 base + OBBBA supplement','#3b82f6')
  +kpi('ICE Budget','$'+s.ice_budget+'B/yr','Post-OBBBA effective rate','#8b5cf6')
  +'</div></div>'
  +'<div class="tabs">'+TABS.map(function(t){return '<button class="tab'+(t.id==='overview'?' active':'')+'" data-tab="'+t.id+'" onclick="renderTab(\''+t.id+'\')">'+t.label+'</button>';}).join('')+'</div>'
  +'<div class="content"><div id="tab-content"></div></div>';
  renderTab('overview');
}

document.addEventListener('DOMContentLoaded', function() { init(); });
</script>
</body>
</html>
