name: Monthly Data Update

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run data updater
        run: python scripts/prison_data_updater.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "Prison Dashboard Bot"
          git config user.email "bot@prison-dashboard.noreply"
          git add data/live_data.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%B %Y') data refresh"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
